---
# Debian/Ubuntu system updates + auto-updates
# Always runs; idempotent via apt module + force-conf options

- name: Ensure DEBIAN_FRONTEND noninteractive
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^DEBIAN_FRONTEND="
    line: "DEBIAN_FRONTEND=noninteractive"
    create: yes
    state: present
  become: yes

- name: Ensure NEEDRESTART_MODE=a (auto-restart services)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^NEEDRESTART_MODE="
    line: "NEEDRESTART_MODE=a"
    create: yes
    state: present
  become: yes

- name: Install needrestart (creates /var/run/reboot-required)
  ansible.builtin.apt:
    name: needrestart
    state: present
  become: yes

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 0
  become: yes

- name: Upgrade all packages (dist upgrade with safe options)
  ansible.builtin.apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
    # allow_releaseinfo_change: yes
    dpkg_options: "force-confdef,force-confold"
  become: yes

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  become: yes

- name: Deploy unattended-upgrades periodic config
  ansible.builtin.template:
    src: unattended-upgrades-20periodic.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Deploy unattended-upgrades main config
  ansible.builtin.template:
    src: unattended-upgrades-50unattended.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'
  become: yes
