---
# RedHat/CentOS/Fedora system updates + auto-updates
# Always runs; idempotent via shell + changed_when

- name: Install dnf-automatic
  ansible.builtin.dnf:
    name: dnf-automatic
    state: present
  become: yes

- name: Upgrade all packages (dnf or yum via pkg_mgr fact)
  ansible.builtin.shell: |
    {{ ansible_facts.pkg_mgr }} -y upgrade 2>&1 | tee /tmp/dnf_upgrade.log
  args:
    executable: /bin/bash
  become: yes
  register: upgrade_result
  changed_when: "'Nothing to do' not in upgrade_result.stdout"

- name: Deploy dnf-automatic config
  ansible.builtin.template:
    src: dnf-automatic.conf.j2
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Enable dnf-automatic timer
  ansible.builtin.systemd:
    name: dnf-automatic.timer
    enabled: yes
    state: started
  become: yes
