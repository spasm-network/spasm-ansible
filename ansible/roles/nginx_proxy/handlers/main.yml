---
- name: Test nginx configuration
  ansible.builtin.command: nginx -t
  environment:
    PATH: "{{ ansible_env.PATH }}:/usr/sbin:/usr/local/sbin"
  register: nginx_test
  changed_when: false
  failed_when: false
  listen: "Test and reload nginx"

- name: Save failing nginx config for debugging
  ansible.builtin.copy:
    content: "{{ lookup('file', '/etc/nginx/sites-available/' + (nginx_site_name | default('app-proxy'))) }}"
    dest: "/var/log/nginx/failed-{{ nginx_site_name | default('app-proxy') }}-{{ ansible_date_time.iso8601_basic }}.conf"
    owner: root
    group: root
    mode: '0600'
  ignore_errors: yes
  when: nginx_test.rc != 0
  listen: "Test and reload nginx"

- name: Fail the play with nginx test output
  ansible.builtin.fail:
    msg: "nginx config test failed: {{ nginx_test.stderr | default(nginx_test.stdout) }}"
  when: nginx_test.rc != 0
  listen: "Test and reload nginx"

- name: Reload nginx (only if test succeeded)
  service:
    name: "{{ nginx_service_name | default('nginx') }}"
    state: reloaded
  when: nginx_test.rc == 0
  listen: "Test and reload nginx"
