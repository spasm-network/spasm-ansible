- name: Ensure facts are gathered
  ansible.builtin.setup:
  when: ansible_facts['os_family'] is not defined

- name: Load distro-specific variables
  ansible.builtin.include_vars:
    file: "{{ role_path }}/vars/{{ ansible_facts.os_family }}.yml"

- name: Assert distro variables loaded
  ansible.builtin.assert:
    that:
      - firewall_pkg is defined
      - firewall_service_name is defined
    fail_msg: "Unsupported OS family or missing role vars for {{ ansible_facts.os_family }}"

- name: Set new_ssh_port to 22 if undefined or empty
  ansible.builtin.set_fact:
    new_ssh_port: 22
  when: new_ssh_port is not defined or new_ssh_port == '' or new_ssh_port | int == 0

- name: Validate new_ssh_port is numeric and in valid range
  ansible.builtin.assert:
    that:
      - new_ssh_port | int > 0
      - new_ssh_port | int < 65536
    fail_msg: "new_ssh_port must be a valid port number (1-65535), got: {{ new_ssh_port }}"

- name: Check SELinux status (RedHat family only)
  ansible.builtin.command: getenforce
  register: _selinux_status
  changed_when: false
  failed_when: false
  when: ansible_facts.os_family == 'RedHat'
  become: true

- name: Warn if SELinux is enforcing (RedHat family)
  ansible.builtin.debug:
    msg: "WARNING: SELinux is {{ _selinux_status.stdout }}. If firewalld fails, SELinux may be blocking access."
  when:
    - ansible_facts.os_family == 'RedHat'
    - _selinux_status.stdout == 'Enforcing'

- name: Ensure DEBIAN_FRONTEND noninteractive (Debian family only)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^DEBIAN_FRONTEND="
    line: "DEBIAN_FRONTEND=noninteractive"
    create: yes
    state: present
  when:
    - ansible_facts.os_family == 'Debian'
    - set_debian_env | default(true)
  become: true

- name: Ensure NEEDRESTART_MODE=a (Debian family only)
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^NEEDRESTART_MODE="
    line: "NEEDRESTART_MODE=a"
    create: yes
    state: present
  when:
    - ansible_facts.os_family == 'Debian'
    - set_debian_env | default(true)
  become: true

- name: Install firewalld package
  ansible.builtin.package:
    name: "{{ firewall_pkg }}"
    state: present
  become: true

- name: Ensure firewalld is started (temporary, do NOT enable at boot)
  ansible.builtin.service:
    name: "{{ firewall_service_name }}"
    state: started
  become: true

# Open firewall services for provisioning (HTTP, HTTPS)
- name: Open firewall services for provisioning
  ansible.posix.firewalld:
    service: "{{ item }}"
    zone: public
    permanent: true
    state: enabled
    immediate: true
  loop:
    - http
    - https
  become: true

# Open default SSH port 22 only if using default
- name: Open default SSH port 22
  ansible.posix.firewalld:
    service: ssh
    zone: public
    permanent: true
    state: enabled
    immediate: true
  when: new_ssh_port | int == 22
  become: true

# Open custom SSH port if non-standard
- name: Open custom SSH port {{ new_ssh_port }}
  ansible.posix.firewalld:
    port: "{{ new_ssh_port | int }}/tcp"
    zone: public
    permanent: true
    state: enabled
    immediate: true
  when: new_ssh_port | int != 22
  become: true
