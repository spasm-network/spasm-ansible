# Auto-update frequency (in days)
# Examples:
#   1 = daily
#   3 = every 3 days
#   7 = weekly
AUTO_UPDATE_FREQUENCY_DAYS: 1

# Cron job time (UTC)
AUTO_UPDATE_HOUR: "7"
AUTO_UPDATE_MINUTE: "0"

AUTO_UPDATE_SCRIPT: "/root/spasm-ansible/server-setup"
AUTO_UPDATE_LOG_DIR: "/var/log/spasm-ansible"
AUTO_UPDATE_LOG_FILE: "{{ AUTO_UPDATE_LOG_DIR }}/server-setup-cron.log"
AUTO_UPDATE_LOCK_FILE: "/var/run/spasm-ansible.auto-update.lock"
