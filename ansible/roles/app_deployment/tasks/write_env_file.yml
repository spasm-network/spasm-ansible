---
# Idempotent .env creation — creates file only once with optional vars.
# Targets Debian/Ubuntu/RHEL/SUSE (standard shell/copy available).
# Variables are optional; if all are empty/undefined, .env is not created.
# If .env already exists, it is never touched (force: false).
# When creating .env, only defined and non-empty vars are written:
#   ADMINS='value'
#   POSTGRES_PASSWORD='value'
#   HOST_PORT=value
# Use single quotes for string values to preserve literal characters (dollars, backslashes).
# Callers must provide one-line values without embedded single quotes.
# Note: role runs under root/sudo, but .env ownership is set to the target app user for later edits.

- name: Create .env with optional vars if it does not exist
  copy:
    content: "{{ lookup('template', 'env.j2') }}"
    dest: "{{ app_clone_path }}/.env"
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0600"
    force: false
  become: true
  become_user: "{{ owner }}"
  when:
    - admins is defined and admins | string | trim != ''
      or postgres_password is defined and postgres_password | string | trim != ''
      or host_port is defined and host_port | string | trim != ''
