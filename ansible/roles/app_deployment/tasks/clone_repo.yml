- name: Ensure repo ownership is correct
  file:
    path: "{{ app_clone_path }}"
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    recurse: true
  become: true
  when:
    - app_repo_url != ""

- name: Check if repo exists (fresh stat for fetch/reset block)
  stat:
    path: "{{ app_clone_path }}"
  register: repo_exists_now
  become: true
  when:
    - app_repo_url != ""

- name: Fetch and hard-reset to remote branch when repo exists
  block:
    - name: Check for local changes before reset
      command: git status --porcelain
      args:
        chdir: "{{ app_clone_path }}"
      become: true
      become_user: "{{ owner }}"
      register: _git_status
      changed_when: false

    - name: Fetch latest from origin
      command: git fetch origin
      args:
        chdir: "{{ app_clone_path }}"
      become: true
      become_user: "{{ owner }}"
      register: _fetch
      failed_when: _fetch.rc != 0
      changed_when: "'Already up to date.' not in (_fetch.stdout | default(''))"

    - name: Reset working tree to origin/{{ app_git_branch }}
      command: git reset --hard "origin/{{ app_git_branch }}"
      args:
        chdir: "{{ app_clone_path }}"
      become: true
      become_user: "{{ owner }}"
      register: _reset
      failed_when: _reset.rc != 0
      changed_when: "'HEAD is now at' in (_reset.stdout | default('')) or 'Updating' in (_reset.stdout | default(''))"

