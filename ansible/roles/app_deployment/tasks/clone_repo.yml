---
- name: Ensure git is installed
  package:
    name: git
    state: present
  become: true
  failed_when: false

- name: Ensure target clone parent exists
  file:
    path: "{{ app_clone_path | dirname }}"
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0755"
  become: true

- name: Clone or update app repository
  git:
    repo: "{{ app_repo_url }}"
    dest: "{{ app_clone_path }}"
    version: "{{ app_git_branch }}"
    force: no
    update: yes
    accept_hostkey: yes
    # timeout: 300
  become: true
  become_user: "{{ owner }}"
  register: git_result
  when: app_repo_url != ""

- name: Fail if git clone/update failed
  fail:
    msg: "Git clone/update failed for {{ app_repo_url }} -&gt; {{ app_clone_path }}: {{ git_result.msg | default('unknown error') }}"
  when: git_result is defined and git_result is failed

