---
# Configure server (idempotent)
# - Create regular and admin users, set groups and sudoers
# - Export NEEDRESTART_MODE and DEBIAN_FRONTEND to /etc/environment
# - Copy root SSH keys and /root/scripts to users (optional, configurable)
# - Lock the root account
# - Backup existing /etc/ssh/sshd_config and any sshd_config.d files
# - Pre-open the new SSH port in UFW to avoid lockout
# - Edit /etc/ssh/sshd_config:
#     - Change SSH Port to NEW_SSH_PORT
#     - Disable PermitRootLogin
#     - Disable PasswordAuthentication
# - Validate sshd config using full path (/usr/sbin/sshd -t), restart sshd, and verify sshd listens on the new port
#   - If verification fails, automatically restore the backup sshd_config and restart sshd (block/rescue rollback)
# - Ensure sshd_config.d exists and back up/clear extra config files (to avoid conflicting settings)
# - Install and enable UFW and fail2ban; set UFW defaults and allow HTTP/HTTPS
# - Enable fail2ban service and restart SSH/fail2ban as needed
# - Display a brief configuration summary at the end
# Roles:
# preflight_checks
# users_and_groups
# root_lock_and_scripts
# package_update
# sshd_hardening
# firewall_fail2ban
# docker_podman
# ssl_certificate
# nginx_proxy
# app_deployment
# summary_and_logs
- name: Configure server (idempotent)
  hosts: localhost
  connection: local
  become: true
  vars:
    user_name: "{{ lookup('env','USER_NAME') | default('user') }}"
    admin_name: "{{ lookup('env','ADMIN_NAME') | default('admin') }}"
    admin_password: "{{ lookup('env','ADMIN_PASSWORD') | default('') }}"
    new_ssh_port: "{{ lookup('env','NEW_SSH_PORT') | default('22') | int }}"
    copy_ssh_keys_from_root_to_user: true
    copy_ssh_keys_from_root_to_admin: false
    copy_scripts_from_root_to_user: true
    copy_scripts_from_root_to_admin: true
    needrestart_mode: a
    debian_frontend: noninteractive
    extra_ssh_config_dir: /etc/ssh/sshd_config.d
    extra_ssh_config_backup_dir: /etc/ssh/sshd_config.d.bak

  handlers:
    - name: Restart SSH service
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: restarted
        enabled: true

    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

  tasks:

  - name: Gather minimal facts
    ansible.builtin.setup:
      gather_subset: 'min'

  - name: Set SSH service name based on OS family
    ansible.builtin.set_fact:
      ssh_service_name: "{{ 'ssh' if ansible_facts.os_family == 'Debian' else 'sshd' }}"

  - name: Ensure environment variables exported
    ansible.builtin.lineinfile:
      path: /etc/environment
      regexp: "^{{ item.key }}="
      line: "{{ item.key }}={{ item.value }}"
      create: yes
    loop:
      - { key: 'NEEDRESTART_MODE', value: "{{ needrestart_mode }}" }
      - { key: 'DEBIAN_FRONTEND', value: "{{ debian_frontend }}" }

  # - name: Ensure admin group exists
  #   ansible.builtin.group:
  #     name: admin
  #     state: present
