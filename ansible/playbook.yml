---
- hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Print a test message
      ansible.builtin.debug:
        msg: "Playbook ran successfully"
  roles:
    - role: logging

    - role: user_and_groups

    - role: copy_files

    - role: system_updates

    - role: cron_auto_update

    - role: firewall_preopen

    - role: sshd_hardening

    - role: nginx_proxy

    - role: ssl_certificate

    - role: container_runtime
      vars:
        runtime: podman
        runtime_version: null    # or a distro-appropriate version string

    - role: app_deployment

    - role: firewall_enable

    - role: fail2ban
