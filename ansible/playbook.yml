  #
  # - name: Create user .ssh directory
  #   ansible.builtin.file:
  #     path: "{{ user_getent.getent_passwd[user_name].dir }}/.ssh"
  #     state: directory
  #     owner: "{{ user_name }}"
  #     group: "{{ user_name }}"
  #     mode: '0700'
  #   when: user_getent.getent_passwd is defined and user_getent.getent_passwd[user_name] is defined
  #
  # - name: Create admin .ssh directory
  #   ansible.builtin.file:
  #     path: "{{ admin_getent.getent_passwd[admin_name].dir }}/.ssh"
  #     state: directory
