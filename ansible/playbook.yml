  #
  # - name: Copy root authorized_keys to user if requested
  #   ansible.builtin.copy:
  #     src: /root/.ssh/authorized_keys
  #     dest: "{{ user_getent.getent_passwd[user_name].dir }}/.ssh/authorized_keys"
  #     owner: "{{ user_name }}"
  #     group: "{{ user_name }}"
  #     mode: '0600'
  #     remote_src: yes
  #   when: copy_ssh_keys_from_root_to_user and root_authorized_keys.stat.exists and user_getent.getent_passwd is defined and user_getent.getent_passwd[user_name] is defined
  #
  # - name: Copy root authorized_keys to admin if requested
  #   ansible.builtin.copy:
  #     src: /root/.ssh/authorized_keys
  #     dest: "{{ admin_getent.getent_passwd[admin_name].dir }}/.ssh/authorized_keys"
  #     owner: "{{ admin_name }}"
  #     group: "{{ admin_name }}"
  #     mode: '0600'
  #     remote_src: yes
  #   when: copy_ssh_keys_from_root_to_admin and root_authorized_keys.stat.exists and admin_getent.getent_passwd is defined and admin_getent.getent_passwd[admin_name] is defined

  - name: Lock root account
    ansible.builtin.user:
      name: root
      password_lock: yes

  - name: Backup sshd_config
    ansible.builtin.copy:
      src: /etc/ssh/sshd_config
      dest: /etc/ssh/sshd_config.bak
      remote_src: yes
      owner: root
      group: root
      mode: '0644'
      force: yes

  # --- SAFETY: Ensure firewall will allow the new SSH port BEFORE changing sshd ---
  - name: Allow SSH on new port in UFW (pre-open port to avoid lockout)
    ansible.builtin.ufw:
      rule: allow
      port: "{{ new_ssh_port }}"
      proto: tcp
      comment: 'SSH'
    # Reason: Open the new port in the firewall first so when sshd starts on it, connections are permitted.

  - name: Ensure sshd_config.d directory exists
    ansible.builtin.file:
      path: "{{ extra_ssh_config_dir }}"
      state: directory
      mode: '0755'

  - name: Find extra sshd_config files
    ansible.builtin.find:
      paths: "{{ extra_ssh_config_dir }}"
      file_type: file
    register: extra_ssh_configs

  - name: Create backup directory for extra configs
    ansible.builtin.file:
      path: "{{ extra_ssh_config_backup_dir }}"
      state: directory
      mode: '0755'
    when: extra_ssh_configs.matched > 0

  - name: Copy extra configs to backup
    ansible.builtin.copy:
      src: "{{ item.path }}"
      dest: "{{ extra_ssh_config_backup_dir }}/{{ item.path | basename }}"
      remote_src: yes
    loop: "{{ extra_ssh_configs.files }}"
    when: extra_ssh_configs.matched > 0

  - name: Clear extra sshd_config files
    ansible.builtin.copy:
      content: ""
      dest: "{{ item.path }}"
    loop: "{{ extra_ssh_configs.files }}"
    when: extra_ssh_configs.matched > 0
    notify: Restart SSH service

  - name: Configure SSH Port
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^(#\s*)?Port\s+'
      line: "Port {{ new_ssh_port }}"
      state: present

  - name: Configure PermitRootLogin
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^(#\s*)?PermitRootLogin\s+'
      line: 'PermitRootLogin no'
      state: present

  - name: Configure PasswordAuthentication
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^(#\s*)?PasswordAuthentication\s+'
      line: 'PasswordAuthentication no'
      state: present

  # --- RISKY CHANGE: use block/rescue to ensure we can roll back if sshd fails ---
  - block:
      - name: Validate SSH configuration (full path to sshd binary)
        ansible.builtin.command: /usr/sbin/sshd -t
        changed_when: false
        register: sshd_validation_before
        failed_when: sshd_validation_before.rc != 0

      - name: Restart SSH service (apply new config)
        ansible.builtin.service:
          name: "{{ ssh_service_name }}"
          state: restarted
          enabled: true

      - name: Verify sshd is listening on new port
        ansible.builtin.command: ss -ltnp
        register: ss_listen
        changed_when: false

      - name: Fail if sshd is not listening on new SSH port
        ansible.builtin.fail:
          msg: "sshd is not listening on port {{ new_ssh_port }} after restart; rolling back."
        when: ss_listen.stdout.find(':' ~ (new_ssh_port | string)) == -1

    rescue:
      - name: Restore sshd_config from backup (rollback)
        ansible.builtin.copy:
          src: /etc/ssh/sshd_config.bak
          dest: /etc/ssh/sshd_config
          remote_src: yes
          owner: root
          group: root
          mode: '0644'
          force: true

      - name: Validate restored SSH configuration (full path)
        ansible.builtin.command: /usr/sbin/sshd -t
        changed_when: false
        register: sshd_validation_restore
        failed_when: sshd_validation_restore.rc != 0

      - name: Restart SSH service to restore previous listener
        ansible.builtin.service:
          name: "{{ ssh_service_name }}"
          state: restarted
          enabled: true

      - name: Fail overall because sshd change failed and was rolled back
        ansible.builtin.fail:
          msg: "SSH port change failed and previous configuration was restored. See earlier task output for details."

  # - name: Check if /root/scripts exists
  #   ansible.builtin.stat:
  #     path: /root/scripts
  #   register: root_scripts
  #
  # - name: Copy scripts to user if requested
  #   ansible.builtin.copy:
  #     src: /root/scripts/
  #     dest: "{{ user_getent.getent_passwd[user_name].dir }}/scripts/"
  #     owner: "{{ user_name }}"
  #     group: "{{ user_name }}"
  #     mode: '0755'
  #     remote_src: yes
  #   when: copy_scripts_from_root_to_user and root_scripts.stat.exists and user_getent.getent_passwd is defined and user_getent.getent_passwd[user_name] is defined
  #
  # - name: Copy scripts to admin if requested
  #   ansible.builtin.copy:
  #     src: /root/scripts/
  #     dest: "{{ admin_getent.getent_passwd[admin_name].dir }}/scripts/"
  #     owner: "{{ admin_name }}"
  #     group: "{{ admin_name }}"
  #     mode: '0755'
  #     remote_src: yes
  #   when: copy_scripts_from_root_to_admin and root_scripts.stat.exists and admin_getent.getent_passwd is defined and admin_getent.getent_passwd[admin_name] is defined

  - name: Update apt cache
    ansible.builtin.apt:
      update_cache: yes
      cache_valid_time: 3600
    environment:
      NEEDRESTART_MODE: "{{ needrestart_mode }}"
      DEBIAN_FRONTEND: "{{ debian_frontend }}"

  - name: Install ufw and fail2ban
    ansible.builtin.apt:
      name:
        - ufw
        - fail2ban
      state: present
    environment:
      NEEDRESTART_MODE: "{{ needrestart_mode }}"
      DEBIAN_FRONTEND: "{{ debian_frontend }}"

  - name: Configure UFW default policies
    ansible.builtin.ufw:
      direction: "{{ item.direction }}"
      policy: "{{ item.policy }}"
    loop:
      - { direction: 'incoming', policy: 'deny' }
      - { direction: 'outgoing', policy: 'allow' }

  - name: Allow HTTP and HTTPS in UFW
    ansible.builtin.ufw:
      rule: allow
      name: "{{ item }}"
    loop:
      - http
      - https
    ignore_errors: true

  - name: Enable UFW
    ansible.builtin.ufw:
      state: enabled

  - name: Enable fail2ban
    ansible.builtin.service:
      name: fail2ban
      enabled: true
      state: restarted

  - name: Display configuration summary
    ansible.builtin.debug:
      msg: |
        ✓ Server configuration complete!
        
        Users:
          - {{ user_name }} (SSH keys only, no sudo access)
          - {{ admin_name }} (SSH to user, then 'su - admin' for sudo)
        
        SSH:
          - Port: {{ new_ssh_port }}
          - Root login: disabled
          - Password authentication: disabled
        
        Security:
          - Firewall (UFW): enabled
          - Intrusion detection (fail2ban): enabled
        
        Next steps:
          1. Verify SSH access on port {{ new_ssh_port }}
          2. Test 'su - admin' workflow
          3. Review firewall rules: sudo ufw status
          4. Monitor fail2ban: sudo fail2ban-client status

# - Pre-opened UFW port to avoid locking out admin if sshd starts on new port but firewall blocks it.
# - Used full path /usr/sbin/sshd -t to validate config reliably (some PATHs don't include /usr/sbin).
# - Wrapped sshd restart and verification in block/rescue so failures automatically restore previous working sshd_config.
