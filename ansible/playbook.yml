  #   ansible.builtin.copy:
  #     dest: /etc/sudoers.d/admin_group
  #     content: "%admin ALL=(ALL:ALL) ALL\n"
  #     mode: '0440'
  #     validate: 'visudo -cf %s'
  #
  # - name: Ensure regular user exists (SSH keys only, no password)
  #   ansible.builtin.user:
  #     name: "{{ user_name }}"
  #     shell: /bin/bash
  #     create_home: yes
  #     password_lock: yes
  #     state: present
  #
  # - name: Ensure admin group (same name as admin user) exists
  #   ansible.builtin.group:
  #     name: "{{ admin_name }}"
  #     state: present
  #
  # - name: Ensure admin user exists with password
  #   ansible.builtin.user:
  #     name: "{{ admin_name }}"
  #     shell: /bin/bash
  #     create_home: yes
  #     group: "{{ admin_name }}"
  #     groups: sudo,admin
  #     append: yes
  #     password: "{{ admin_password | password_hash('sha512') }}"
  #     state: present
  #   when: admin_password != ''
  #
  # - name: Ensure admin user exists without password (if not provided)
  #   ansible.builtin.user:
  #     name: "{{ admin_name }}"
  #     shell: /bin/bash
  #     create_home: yes
  #     group: "{{ admin_name }}"
  #     groups: sudo,admin
  #     append: yes
  #     password_lock: yes
  #     state: present
  #   when: admin_password == ''
  #
  # - name: Get user home directory via getent
  #   ansible.builtin.getent:
  #     database: passwd
  #     key: "{{ user_name }}"
  #   register: user_getent
  #
  # - name: Get admin home directory via getent
  #   ansible.builtin.getent:
  #     database: passwd
