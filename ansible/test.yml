- hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # user_name: "{{ lookup('env','USER_NAME') or 'user' }}"
    # admin_name: "{{ lookup('env','ADMIN_NAME') or 'admin' }}"
    # new_ssh_port: "{{ lookup('env','NEW_SSH_PORT') or '22' | int }}"
  tasks:
    - name: Print a test message
      ansible.builtin.debug:
        msg: "Test playbook ran successfully"
  roles:
    - role: logging

    - role: user_and_groups

    - role: copy_files

    - role: system_updates

    - role: firewall_preopen

    - role: sshd_hardening

    - role: nginx_proxy

    - role: ssl_certificate

    - role: container_runtime
      vars:
        runtime: podman          # or docker
        runtime_version: null    # or a distro-appropriate version string

    - role: app_deployment

    - role: firewall_enable

